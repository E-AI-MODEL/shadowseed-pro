name: Gate unification

on:
  pull_request:
    paths:
      - "src/shadowseed/gate/**"
      - "src/shadowseed/manager.py"
      - "src/shadowseed/__init__.py"
      - "tests/**"
      - ".github/workflows/gate-unification.yml"

jobs:
  gate-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -q --upgrade pip
      - run: pip install -q -e ".[test]"
      - name: Run complete suite with JUnit output
        run: pytest -q --tb=short --junitxml=full-test-results.xml
      - name: Upload complete results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-test-results
          path: full-test-results.xml
