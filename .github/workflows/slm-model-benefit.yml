name: Research - SLM model benefit

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: Curated ungated model
        required: true
        default: TinyLlama/TinyLlama-1.1B-Chat-v1.0
        type: choice
        options:
          - HuggingFaceTB/SmolLM2-360M-Instruct
          - Qwen/Qwen2.5-0.5B-Instruct
          - TinyLlama/TinyLlama-1.1B-Chat-v1.0
          - Qwen/Qwen2.5-1.5B-Instruct
          - HuggingFaceTB/SmolLM2-1.7B-Instruct
          - Qwen/Qwen3-1.7B
          - Qwen/Qwen2.5-3B-Instruct
          - microsoft/Phi-3.5-mini-instruct
          - Qwen/Qwen3-4B
      turns:
        description: Number of detection turns
        required: true
        default: "3"
        type: string
      max_new_tokens:
        description: Maximum generated tokens
        required: true
        default: "220"
        type: string

permissions:
  contents: read

jobs:
  model-benefit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install model dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[models]"
      - name: Run model benefit suite
        run: |
          shadowseed run-model-benefit-suite \
            --backend hf-transformers \
            --model-id "${{ inputs.model_id }}" \
            --turns "${{ inputs.turns }}" \
            --max-new-tokens "${{ inputs.max_new_tokens }}" \
            --output results/ssl45_model_benefit_suite.json
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: slm-model-benefit
          path: results/ssl45_model_benefit_suite.json
