name: Research · Paper · scenario benchmark

on:
  workflow_dispatch:

jobs:
  paper-scenario-suite:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run paper scenario suite
        run: |
          python -m shadowseed.benchmark.paper_scenario_suite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-scenario-suite
          path: results/paper_scenario_suite.json
