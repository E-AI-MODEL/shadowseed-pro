name: Research · Paper · pipeline

on:
  workflow_dispatch:
  push:
    paths:
      - "data/papers/**"

jobs:
  run-paper-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run paper pipeline
        run: |
          python -m shadowseed.paper_pipeline

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/paper_ingest || true
          git commit -m "Update paper pipeline results" || true
          git push || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paper-pipeline-results
          path: results/paper_ingest
