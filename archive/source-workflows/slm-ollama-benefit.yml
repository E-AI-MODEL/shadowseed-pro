name: Research · SLM Model Benefit (Ollama)

# Runs the SSL 4.5 model-benefit suite against a real small model served by
# Ollama inside the runner. Ollama uses quantized GGUF weights, so this is far
# lighter than the transformers/torch path and fits on a standard runner.

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: "Ollama model name (must exist in the Ollama library)"
        required: true
        default: "qwen2.5:0.5b-instruct"
        type: choice
        options:
          - qwen2.5:0.5b-instruct
          - qwen2.5:1.5b-instruct
          - tinyllama
          - llama3.2:1b
          - llama3.2:3b
          - gemma2:2b
      turns:
        description: "Detector turns per scenario"
        required: true
        default: "3"
      max_new_tokens:
        description: "Max new tokens per generation"
        required: true
        default: "220"

permissions:
  contents: read

jobs:
  slm-ollama-benefit:
    name: SLM Benefit via Ollama (${{ inputs.model_id }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install shadowseed (no model extras needed)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama server
        run: |
          if curl -fsS http://localhost:11434/api/version >/dev/null 2>&1; then
            echo "Ollama is already up" | tee ollama.log
            exit 0
          fi
          ollama serve > ollama.log 2>&1 &
          # wait for the HTTP API to come up
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:11434/api/version >/dev/null 2>&1; then
              echo "Ollama is up"; break
            fi
            sleep 2
          done

      - name: Pull model
        run: ollama pull "${{ inputs.model_id }}"

      - name: Run model-benefit suite via Ollama
        env:
          OLLAMA_HOST: http://localhost:11434
        run: |
          mkdir -p results
          python -m shadowseed.cli run-model-benefit-suite \
            --backend ollama \
            --model-id "${{ inputs.model_id }}" \
            --turns "${{ inputs.turns }}" \
            --max-new-tokens "${{ inputs.max_new_tokens }}" \
            --output results/ssl45_model_benefit_suite.json

      - name: Analyze results
        run: python -m shadowseed.cli analyze-results || true

      - name: Normalize artifact name
        env:
          MODEL_ID: ${{ inputs.model_id }}
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import os
          import re

          model_id = os.environ["MODEL_ID"]
          safe_model_id = re.sub(r'[":<>|*?\r\n\\/]', "-", model_id).strip(".- ")
          print(f"SAFE_MODEL_ID={safe_model_id or 'model'}")
          PY

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ssl45-slm-ollama-results-${{ env.SAFE_MODEL_ID }}
          path: |
            results/ssl45_model_benefit_suite.json
            ollama.log
          if-no-files-found: error
