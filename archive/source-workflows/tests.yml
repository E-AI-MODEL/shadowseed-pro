name: CI · Checks & benchmarks

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  pytest:
    name: "01 Codecheck: werkt de Python-code?"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Installeer test-dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Draai lint-check
        run: python -m ruff check src tests

      - name: Draai unit tests met coverage
        run: python -m pytest -q --cov=shadowseed --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn

  ssl-gap-suite:
    name: "02 Gap Finder: vindt SSL ontbrekende punten?"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Draai Gap Finder suite
        run: |
          python -m shadowseed.cli run-gap-suite

      - name: Upload Gap Finder resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 02-gap-finder-results
          path: results/ssl45_gap_suite.json
          if-no-files-found: error

  ssl-false-positive-suite:
    name: "03 Rustig blijven: voegt SSL geen onzin toe?"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Draai false-positive controle
        run: |
          python -m shadowseed.cli run-false-positive-suite

      - name: Upload false-positive resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 03-false-positive-results
          path: results/ssl45_false_positive_suite.json
          if-no-files-found: error

  ssl-benefit-suite:
    name: "04 Antwoordwinst: wordt een antwoord completer met SSL?"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Draai antwoordwinst suite
        run: |
          python -m shadowseed.cli run-benefit-suite

      - name: Upload antwoordwinst resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 04-answer-benefit-results
          path: results/ssl45_benefit_suite.json
          if-no-files-found: error

  ssl-model-benefit-suite:
    name: "05 Model smoke: werkt dezelfde modeltest met en zonder SSL?"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Draai model-benefit fixture smoke
        run: |
          python -m shadowseed.cli run-model-benefit-suite --backend fixture

      - name: Upload model smoke resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 05-model-smoke-results
          path: results/ssl45_model_benefit_suite.json
          if-no-files-found: error

  blind-benchmark-smoke:
    name: "06 Blind test: kan SSL scoren zonder labels vooraf te zien?"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Maak tijdelijke private labels
        run: |
          mkdir -p benchmarks/private
          cat > benchmarks/private/blind_suite_labels.smoke.json <<'JSON'
          {
            "version": "blind-0.1-smoke-labels",
            "labels": [
              {
                "id": "BLIND_HIST_001",
                "expected_gaps": [
                  "Koloniale of internationale afhankelijkheden in de economische uitleg."
                ],
                "must_not_add": [
                  "Onbewezen directe oorzaak zonder bron."
                ]
              },
              {
                "id": "BLIND_LAW_001",
                "expected_gaps": [
                  "Rechtsbevoegdheid bij partijen uit verschillende landen.",
                  "Toepasselijk recht bij grensoverschrijdende afspraken."
                ],
                "must_not_add": [
                  "Automatische strafrechtelijke aansprakelijkheid van de aanbieder."
                ]
              },
              {
                "id": "BLIND_ARCH_001",
                "expected_gaps": [
                  "Privacyrisico bij verwerking van gevoelige gebruikersdata.",
                  "Misbruikbeperking op publieke API-endpoints."
                ],
                "must_not_add": [
                  "Verplichte blockchainopslag voor medische data."
                ]
              },
              {
                "id": "BLIND_ETH_001",
                "expected_gaps": [
                  "Geïnformeerde toestemming van betrokken personen.",
                  "Privacybescherming bij medische gegevensverwerking."
                ],
                "must_not_add": [
                  "Toestemming is nooit nodig bij medisch onderzoek."
                ]
              },
              {
                "id": "BLIND_EDU_001",
                "expected_gaps": [
                  "Effect op kansengelijkheid tussen verschillende leerlinggroepen.",
                  "Werkdruk voor docenten bij uitvoering van het beleid."
                ],
                "must_not_add": [
                  "Alle leerlingen halen automatisch hogere cijfers."
                ]
              }
            ]
          }
          JSON

      - name: Draai blinde smoke-test
        run: |
          python -m shadowseed.cli run-blind-benchmark \
            --input src/shadowseed/data/blind_suite_public.json \
            --labels benchmarks/private/blind_suite_labels.smoke.json \
            --output results/blind_benchmark.json \
            --turns 3

      - name: Upload blinde benchmark resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 06-blind-benchmark-results
          path: results/blind_benchmark.json
          if-no-files-found: error

  ssl-adversarial-gate:
    name: "06b Adversarial Gate: blokkeert de Gate misleidende lure-seeds?"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Draai adversarial Gate-benchmark
        run: |
          python -m shadowseed.cli run-adversarial-gate-benchmark

      - name: Upload adversarial Gate-resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 06b-adversarial-gate-results
          path: |
            results/adversarial_gate_benchmark.json
            results/adversarial_gate_casebook.md
          if-no-files-found: error

  ssl-probe-utility:
    name: "06c Probe utility: helpen promoted seeds bij scherpere vervolgacties?"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Draai probe-utility benchmark
        run: |
          python -m shadowseed.cli run-probe-utility-benchmark

      - name: Draai probe-feedback behavioral suite
        run: |
          python -m shadowseed.cli run-probe-feedback-behavior-suite

      - name: Upload probe-utility resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 06c-probe-utility-results
          path: |
            results/ssl45_probe_utility_suite.json
            results/probe_feedback_behavior_suite.json
          if-no-files-found: error

  ssl-analysis:
    name: "07 Rapport: vat de belangrijkste resultaten samen"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - ssl-gap-suite
      - ssl-false-positive-suite
      - ssl-benefit-suite
      - ssl-model-benefit-suite
      - blind-benchmark-smoke
      - ssl-adversarial-gate
      - ssl-probe-utility

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Download benchmark-artifacts uit eerdere jobs
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Voeg open-set summary toe aan artifact-bundel indien aanwezig
        run: |
          # De open-set HF workflow is een aparte workflow_dispatch-run.
          # Als die eerder een summary heeft gecommit, staat die nu in de
          # checkout. Kopieer hem naar downloaded-artifacts zodat
          # artifact_snapshot hem meeneemt. Dit is passthrough, geen generate.
          summary="results/open_review/open_set_seed_review_summary.json"
          if [ -f "$summary" ]; then
            mkdir -p downloaded-artifacts/open-set-passthrough
            cp "$summary" downloaded-artifacts/open-set-passthrough/
            echo "open-set summary toegevoegd aan bundel."
          else
            echo "Geen open-set summary gevonden - open-set metrics blijven n/a."
          fi

      - name: Bouw provenance-veilige results-map uit artifacts
        run: |
          set -euo pipefail
          rm -rf results
          python -m shadowseed.analysis.artifact_snapshot \
            --source downloaded-artifacts \
            --target-dir results \
            --artifacts-dir results/artifacts \
            --manifest-path results/manifest.json \
            --source-workflow "Checks en benchmark-resultaten" \
            --source-run-id "${{ github.run_id }}" \
            --repository "${{ github.repository }}" \
            --published-via analysis-job \
            --path-key results_path

      - name: Maak analyserapport
        run: |
          python -m shadowseed.cli analyze-results

      - name: Voeg manifest toe aan rapport-artifact
        run: |
          cp results/manifest.json results/analysis/manifest.json

      - name: Upload analyserapport
        uses: actions/upload-artifact@v4
        with:
          name: 07-analysis-report
          path: results/analysis
          if-no-files-found: error

  nlp-smoke:
    name: "08 AbsenceBench rooktest: werkt de lokale dataset-run?"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Draai AbsenceBench rooktest
        run: |
          python -m shadowseed.cli run-absencebench-smoke --output absencebench_smoke.json

      - name: Upload AbsenceBench resultaten
        uses: actions/upload-artifact@v4
        with:
          name: 08-absencebench-smoke-results
          path: benchmarks/results/absencebench_smoke.json
          if-no-files-found: error

  benchmark-matrix:
    name: "09 Herhalingstest: wat gebeurt er bij meer SSL-rondes?"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: pytest
    strategy:
      matrix:
        turns: [1, 2, 3, 5, 8]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer pakket
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Draai herhalingstest
        run: |
          python -m shadowseed.cli run-gap-suite \
            --turns ${{ matrix.turns }} \
            --output results/ssl45_gap_suite_turns_${{ matrix.turns }}.json

      - name: Upload herhalingstest resultaat
        uses: actions/upload-artifact@v4
        with:
          name: 09-repeat-test-turns-${{ matrix.turns }}
          path: results/ssl45_gap_suite_turns_${{ matrix.turns }}.json
          if-no-files-found: error
