name: Research · SSOT falsification

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/shadowseed/ssot.py"
      - "tests/test_ssot_falsification.py"
      - ".github/workflows/ssot-falsification.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  ssot-falsification:
    name: SSOT falsification tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run SSOT falsification tests
        run: |
          mkdir -p results/falsification
          python -m pytest tests/test_ssot_falsification.py -q | tee results/falsification/pytest_output.txt

      - name: Build falsification report
        env:
          SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          output = Path('results/falsification/pytest_output.txt').read_text(encoding='utf-8')
          passed = 'failed' not in output.lower()

          lines = [
              '# SSOT Falsification Run',
              '',
              '## Conclusie',
              '',
              '**De falsification-tests zijn geslaagd.**' if passed else '**De falsification-tests zijn niet geslaagd.**',
              '',
              'Deze run test of de SSOT-laag niet naïef elke bron als bewijs accepteert.',
              '',
              '## Wat wordt getest',
              '',
              '- Een irrelevant of fout document mag geen seed promoten.',
              '- LLM-output met `llm_proposed` mag geen seed valideren.',
              '- Pas na menselijke verificatie via `verify_chunk()` mag een chunk als evidence tellen.',
              '- Rejected chunks mogen nooit seeds valideren.',
              '',
              '## Waarom dit belangrijk is',
              '',
              'Dit bewaakt het verschil tussen gewone retrieval en SSL met gecontroleerde validatie. Een document of modelantwoord is niet automatisch waarheid. De Validation Gate blijft leidend.',
              '',
              '## Testoutput',
              '',
              '```text',
              output.strip(),
              '```',
              '',
              '## Grens van de claim',
              '',
              'Deze run gebruikt kleine unit/integratietests. Hij bewijst dat de veiligheidsregels in de huidige implementatie werken, niet dat alle mogelijke slechte documenten of bronconflicten al zijn afgedekt.',
              '',
              '## Commit',
              '',
              f"`{os.environ.get('SHA', '')}`",
              '',
          ]
          Path('SSOT-Falsification.md').write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Upload falsification artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssot-falsification-results
          path: |
            results/falsification/pytest_output.txt
            SSOT-Falsification.md
          if-no-files-found: error

      - name: Publish falsification report to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          WIKI_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.wiki.git"
          git clone "$WIKI_URL" wiki || exit 0
          cp SSOT-Falsification.md wiki/.
          if [ ! -f wiki/Home.md ]; then
            printf '# Shadow Seed Learning 4.5\n\n- [SSOT Falsification](SSOT-Falsification)\n' > wiki/Home.md
          elif ! grep -q "SSOT-Falsification" wiki/Home.md; then
            printf '\n- [SSOT Falsification](SSOT-Falsification)\n' >> wiki/Home.md
          fi
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Home.md SSOT-Falsification.md
          git commit -m "Update SSOT falsification report" || true
          git push || true
