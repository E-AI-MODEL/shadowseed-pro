name: Research · Retrieval backend comparison

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrieval-comparison:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,vector]"

      - name: Run retrieval benchmark
        run: |
          mkdir -p results/retrieval
          for backend in memory faiss chroma; do
            python -m shadowseed.cli run-retrieval-benchmark \
              --backend ${backend} \
              --output results/retrieval/${backend}.json
          done

      - name: Build comparison
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          base = Path('results/retrieval')
          backends = ['memory','faiss','chroma']

          rows = []
          for b in backends:
              data = json.loads((base / f"{b}.json").read_text())
              m = data['metrics']
              rows.append({
                  'backend': b,
                  'hit': m['hit@k'],
                  'precision': m['precision@k'],
                  'recall': m['recall@k'],
                  'rank': m['avg_rank'],
              })

          lines = [
              '# Retrieval Backend Comparison',
              '',
              '| Backend | hit@3 | precision@3 | recall@3 | avg rank |',
              '|---|---:|---:|---:|---:|',
          ]

          for r in rows:
              lines.append(f"| {r['backend']} | {r['hit']:.2f} | {r['precision']:.2f} | {r['recall']:.2f} | {r['rank']:.2f} |")

          Path('Retrieval-Comparison.md').write_text("\n".join(lines))
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: retrieval-comparison
          path: results/retrieval

      - name: Publish to wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git wiki || exit 0
          cp Retrieval-Comparison.md wiki/.
          cd wiki
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update retrieval comparison" || true
          git push || true
