name: "Research · Laag G activatie-sonde (HF)"

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: "Klein open HF-model om te sonderen"
        required: true
        default: "distilgpt2"
      input_path:
        description: "Dialectische case-file (source_text + cases)"
        required: true
        default: "src/shadowseed/data/dialectic_falsification_fixture.json"

permissions:
  contents: read

jobs:
  activation-probe:
    name: "MLP-activatiescheiding tussen dialectische verdict-klassen"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MODEL_ID: ${{ inputs.model_id }}
      INPUT_PATH: ${{ inputs.input_path }}
      HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installeer package + torch (CPU) + transformers
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers

      - name: Draai de activatie-sonde (Laag G-signaal, geen verdict)
        run: |
          args=(run-activation-probe
            --backend hf
            --model-id "$MODEL_ID"
            --input "$INPUT_PATH"
            --output results/activation_probe.json)
          python -m shadowseed.cli "${args[@]}"

      - name: Korte samenvatting naar de job-log
        run: |
          python - <<'EOF'
          import json
          r = json.load(open("results/activation_probe.json"))
          rep = r["report"]
          print("backend:", r["backend"])
          print("cases:", [(c["seed_text"][:40], c["verdict"]) for c in r["cases"]])
          print("sterkste laag:", rep["strongest_layer"],
                "| cosine-afstand:", rep["strongest_cosine_distance"])
          print("doctrine:", r["doctrine"])
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # vaste naam: model_id kan '/' bevatten en dat is ongeldig in artifactnamen
          name: activation-probe
          path: results/activation_probe.json
          if-no-files-found: error
